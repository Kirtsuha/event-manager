databaseChangeLog:
  - changeSet:
      id: 0005-create-events-table
      author: course-team
      changes:
        - createTable:
            tableName: events
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: start_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: duration_minutes
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: max_places
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: occupied_places
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false
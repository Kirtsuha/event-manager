databaseChangeLog:
  - changeSet:
      id: 0007-add-fk-registrations-to-events
      author: course-team
      changes:
        - addForeignKeyConstraint:
            constraintName: fk_registration_event
            baseTableName: registrations
            baseColumnNames: event_id
            referencedTableName: events
            referencedColumnNames: id
            onDelete: CASCADE
            onUpdate: RESTRICT
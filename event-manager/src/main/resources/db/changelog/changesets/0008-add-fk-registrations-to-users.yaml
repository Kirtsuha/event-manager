databaseChangeLog:
  - changeSet:
      id: 0008-add-fk-registrations-to-users
      author: course-team
      changes:
        - addForeignKeyConstraint:
            constraintName: fk_registration_user
            baseTableName: registrations
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE
            onUpdate: RESTRICT